version: 2

builds:
  - main: ./cmd/gotimekpr
    binary: gotimekpr
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.buildDate={{.Date}}
    goos:
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - formats: [tar.gz]
    files:
      - LICENSE

changelog:
  sort: asc
